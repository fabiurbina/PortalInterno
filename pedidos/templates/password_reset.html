{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar senha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#0D3B66,#2EC4B6);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card-reset{
            width:100%;
            max-width:450px;
            border:none;
            border-radius:20px;
            overflow:hidden;
        }

        .header{
            background:#0D3B66;
            text-align:center;
            padding:30px;
        }

        .body-card{
            padding:30px;
        }

        .logo{
            max-width:250px;
        }

        .btn-viesano{
            background:#0D3B66;
            border:none;
        }

        .btn-viesano:hover{
            background:#082744;
        }

    </style>

</head>

<body>

<div class="card shadow-lg card-reset">

    <div class="header">

        <img src="{% static 'img/logo.png' %}" class="logo">

        <h4 class="text-white mt-3">
            Recuperar senha
        </h4>

        <p class="text-white">
            Informe o e-mail cadastrado para receber o link de redefinição.
        </p>

    </div>

    <div class="body-card">

        <form method="post">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    E-mail
                </label>

                {{ form.email }}

            </div>

            <button class="btn btn-viesano text-white w-100">

                Enviar link

            </button>

        </form>

    </div>

</div>

</body>
</html>
