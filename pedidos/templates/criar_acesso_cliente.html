{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Criar acesso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">

            <h3>Criar acesso ao Portal do Cliente</h3>

        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label>CNPJ</label>

                    <input
                        type="text"
                        name="cnpj"
                        class="form-control"
                        placeholder="00.000.000/0000-00">

                </div>

                <button class="btn btn-primary">

                    Buscar Cliente

                </button>

            </form>
            {% if cliente %}

            <hr>

            <h4>Cliente encontrado</h4>

            <p><strong>Razão Social:</strong> {{ cliente.razao_social }}</p>

            <p><strong>CNPJ:</strong> {{ cliente.cnpj_cpf }}</p>

            <p><strong>Código Omie:</strong> {{ cliente.codigo_cliente }}</p>

            {% endif %}
        </div>

    </div>

</div>

</body>

</html>
