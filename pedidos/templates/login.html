{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Viesano</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

        body{
            background: linear-gradient(135deg,#0D3B66,#2EC4B6);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-card{
            width:100%;
            max-width:450px;
            border:none;
            border-radius:20px;
            overflow:hidden;
        }

        .login-header{
            background:#0D3B66;
            text-align:center;
            padding:30px;
        }

        .login-body{
            padding:30px;
        }

        .btn-viesano{
            background:#0D3B66;
            border:none;
        }

        .btn-viesano:hover{
            background:#082744;
        }

        .logo{
            max-width:250px;
        }

    </style>

</head>
<body>

<div class="card shadow-lg login-card">

    <div class="login-header">

        <img src="{% static 'img/logo.png' %}"
             class="logo"
             alt="Viesano">

        <h4 class="mt-3 text-white">
            Portal do Cliente
        </h4>

        <p class="mt-3 text-white">
            Acompanhe seus pedidos em tempo real
        </p>

    </div>

    <div class="login-body">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    Usuário
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Digite seu usuário">
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Senha
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Digite sua senha">
            </div>

            <button class="btn btn-viesano text-white w-100">
                Entrar
            </button>

        </form>

    </div>

</div>

</body>
</html>
