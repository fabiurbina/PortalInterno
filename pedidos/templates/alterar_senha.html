{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h4>Alterar Senha</h4>
        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-success w-100">
                    Alterar Senha
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
